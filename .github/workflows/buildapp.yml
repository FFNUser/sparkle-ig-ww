# Inspired heavily by the following workflows
# https://github.com/arichornlover/uYouEnhanced/blob/main/.github/workflows/buildapp.yml
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml
# https://github.com/BandarHL/BHTwitter/actions/workflows/build.yml

name: Build and Package Sparkle (Tweak Only)

on:
    workflow_dispatch:
        inputs:
            upload_artifact:
                description: "Upload Artifact"
                default: true
                required: false
                type: boolean
            with_flex:
                description: "Include libflex"
                default: false
                required: false
                type: boolean
            for_sidestore:
                description: "Build for SideStore (Strips Extensions)"
                default: false
                required: false
                type: boolean
            bundle_id:
                description: "Bundle ID"
                default: ""
                required: false
                type: string
  
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        name: Build Sparkle
        runs-on: macos-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Main
              uses: actions/checkout@v4
              with:
                path: main
                submodules: recursive

            - name: Install Dependencies
              run: brew install ldid dpkg make autoconf automake cmake libtool meson nasm ninja pkgconf wget yasm

            - name: Set PATH environment variable
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH 

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                # Pinned to a known-good commit. theos master tracks the latest
                # Logos, and commit 777925d (#114) regressed bare %orig parsing
                # (single-line `{ %orig; }`, `%orig]`, etc.). This commit references
                # Logos a623700, the last version that builds this project.
                ref: 405e5c6ddb288615c030eeaedc6b265aae748285
                path: ${{ github.workspace }}/theos
                submodules: recursive
        
            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Get Sparkle Version
              id: sparkle_version
              run: |
                SPARKLE_VERSION=$(awk '/Version:/ {print $2}' main/control)

                echo "SPARKLE_VERSION=${SPARKLE_VERSION}" >> "$GITHUB_ENV"
                echo "version=${SPARKLE_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Cache FFmpeg frameworks
              id: ffmpeg_cache
              uses: actions/cache@v4
              with:
                path: |
                  main/modules/ffmpegkit
                  main/.cache/ffmpegkit
                key: ffmpegkit-${{ runner.os }}-${{ hashFiles('main/fetch-ffmpegkit.sh') }}

            - name: Prepare FFmpeg frameworks
              run: |
                cd main
                chmod +x ./fetch-ffmpegkit.sh
                ./fetch-ffmpegkit.sh
            
            - name: Build Sparkle tweak
              run: |
                pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
                
                cd main
                curl -Lo ipapatch https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64
                chmod +x ipapatch
                export PATH=.:$PATH
                ls -la

                FLAGS="--release"
                if [ "${{ inputs.for_sidestore }}" = "true" ]; then
                  FLAGS="--sidestore"
                fi
                if [ "${{ inputs.with_flex }}" = "true" ]; then
                  FLAGS="$FLAGS --flex"
                fi
                if [ -n "${{ inputs.bundle_id }}" ]; then
                  FLAGS="$FLAGS --bundle-id ${{ inputs.bundle_id }}"
                fi
                
                # Running compilation directly rather than "build.sh ipa" which expects an IPA.
                # Adjust compile/package command here if your build.sh has a custom non-ipa build target
                ./build.sh $FLAGS
                
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Compress modifications and tweaks into ZIP
              id: package_zip
              run: |
                cd main
                mkdir -p zip_payload
                
                # Gather your built tweaks, bundles, dynamic libraries, and configuration files here.
                # Customize this cp command depending on what directory output build.sh produces.
                # Commonly, compiled products live in .theos/obj/debug/ or similar project subfolders.
                cp -r .theos/obj/*.dylib zip_payload/ 2>/dev/null || true
                cp -r *.bundle zip_payload/ 2>/dev/null || true
                cp -r packages/* zip_payload/ 2>/dev/null || true
                
                # Fallback: if nothing copied yet, pack the build outputs from the packages directory
                if [ -z "$(ls -A zip_payload)" ]; then
                   cp -r packages zip_payload/
                fi

                # Compress into a zip named after the version
                ZIP_NAME="Sparkle_v${{ env.SPARKLE_VERSION }}_tweaks.zip"
                zip -r "$ZIP_NAME" zip_payload/
                
                echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
                echo "zip_path=${{ github.workspace }}/main/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

            - name: Upload Artifact
              if: ${{ inputs.upload_artifact }}
              uses: actions/upload-artifact@v4
              with:
                name: ${{ steps.package_zip.outputs.zip_name }}
                path: ${{ steps.package_zip.outputs.zip_path }}
                if-no-files-found: error

            - name: Create Release
              uses: softprops/action-gh-release@v2.0.6
              with:
                name: Sparkle v${{ steps.sparkle_version.outputs.version }} (Tweak Only)
                files: ${{ steps.package_zip.outputs.zip_path }}
                draft: true

            - name: Output Release URL
              run: |
                echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
